seed_index: 0
deterministic: False
batch_size: 64 # 128 for B-32, B-16 and 64 for L-14

trainer:
  max_epochs: ${dataset.ft_epochs}
  log_every_n_steps: 1
  fast_dev_run: False
  accelerator: 'gpu'
  devices: 1
  precision: 32
  max_steps: -1
  num_sanity_val_steps: 3
  gradient_clip_val: 10.0
  val_check_interval: 1.0
  deterministic: ${train.deterministic}
  accumulate_grad_batches: 2 # 1 if B-32, B-16 and 2 if L-14

# Mergeability regularization configuration
regularization:
  # R2: Moderate Update Regularization
  # Penalizes large deviations from pretrained weights
  # All merge methods show negative coefficients for weight_l2_distance
  enable_moderate_update: false  # Enable/disable R2 regularization
  lambda_moderate_update: 0.01  # Weight for R2 regularization term

  # R3: Gradient Magnitude Regularization
  # Encourages moderate gradient magnitudes (not too large)
  # All merge methods show negative coefficients for gradient_l2_distance
  enable_grad_magnitude: false  # Enable/disable R3 regularization
  lambda_grad_magnitude: 1  # Weight for R3 regularization term

  enable_tv_subspace_penalty: false
  tv_penalty_singular_vectors: "UV" # can be U or V , or "UV"
  subspace_top_k: 10 # number of top directions to keep
  lambda_tv_subspace: 0.001 # strength coefficient

  # Gargiulo Penalty: Keep singular vectors aligned with pretrained
  # Penalizes rotation of top-k singular vectors during finetuning
  enable_gargiulo_penalty: true
  gargiulo_singular_vectors: "U"  # can be "U", "V", or "UV"
  gargiulo_top_k: 10  # number of top singular vectors to keep aligned
  lambda_gargiulo: 0.001  # strength coefficient
  gargiulo_svd_interval: 50  # compute SVD of current weights every N steps




